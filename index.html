<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0a0e14">
<title>CRT Desk — Futures Prop Tracker</title>
<link rel="manifest" href="manifest.json">
<style>
:root{
  --bg:#0a0e14;
  --panel:#11161f;
  --panel-2:#161c27;
  --line:#1f2733;
  --ink:#e8edf4;
  --ink-dim:#8a97a8;
  --ink-faint:#5a6573;
  --green:#3ddc84;
  --green-dim:#1d6b44;
  --red:#ff5d5d;
  --red-dim:#7a2d2d;
  --amber:#ffb84d;
  --blue:#4d9fff;
  --violet:#a78bfa;
  --accent:#3ddc84;
  --radius:14px;
  --mono:'JetBrains Mono','SF Mono',ui-monospace,Menlo,monospace;
  --sans:'Inter',-apple-system,BlinkMacSystemFont,system-ui,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{background:var(--bg);color:var(--ink);font-family:var(--sans);-webkit-font-smoothing:antialiased}
body{padding-bottom:env(safe-area-inset-bottom)}
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap');

/* ---------- Layout ---------- */
.app{max-width:1240px;margin:0 auto;padding:0 16px 120px}
header.topbar{position:sticky;top:0;z-index:50;background:rgba(10,14,20,.85);backdrop-filter:blur(12px);border-bottom:1px solid var(--line);
  display:flex;align-items:center;justify-content:space-between;padding:14px 16px;margin:0 -16px 20px}
.brand{display:flex;align-items:center;gap:11px}
.brand .mark{width:34px;height:34px;border-radius:9px;background:linear-gradient(135deg,var(--green),#2a9d63);display:grid;place-items:center;font-family:var(--mono);font-weight:700;color:#04210f;font-size:15px}
.brand h1{font-size:15px;font-weight:700;letter-spacing:-.01em}
.brand .sub{font-size:11px;color:var(--ink-faint);font-family:var(--mono);letter-spacing:.02em}
.topbar-actions{display:flex;gap:8px;align-items:center}

/* ---------- Tabs ---------- */
.tabs{display:flex;gap:4px;overflow-x:auto;scrollbar-width:none;margin-bottom:22px;padding-bottom:2px}
.tabs::-webkit-scrollbar{display:none}
.tab{flex:0 0 auto;padding:9px 15px;border-radius:10px;border:1px solid transparent;background:transparent;color:var(--ink-dim);
  font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap;transition:.15s;font-family:var(--sans)}
.tab:hover{color:var(--ink);background:var(--panel)}
.tab.active{background:var(--panel-2);color:var(--ink);border-color:var(--line)}

/* ---------- Buttons ---------- */
.btn{font-family:var(--sans);font-size:13px;font-weight:600;border-radius:10px;padding:9px 15px;cursor:pointer;border:1px solid var(--line);
  background:var(--panel-2);color:var(--ink);transition:.15s;display:inline-flex;align-items:center;gap:7px}
.btn:hover{border-color:#2c3849;background:var(--panel)}
.btn.primary{background:var(--green);color:#04210f;border-color:var(--green)}
.btn.primary:hover{background:#36c577}
.btn.ghost{background:transparent}
.btn.danger{color:var(--red);border-color:var(--red-dim)}
.btn.danger:hover{background:rgba(255,93,93,.08)}
.btn.sm{padding:6px 11px;font-size:12px}
.btn.icon{padding:8px;width:36px;height:36px;justify-content:center}

/* ---------- Cards/Grid ---------- */
.grid{display:grid;gap:14px}
.g-2{grid-template-columns:repeat(2,1fr)}
.g-3{grid-template-columns:repeat(3,1fr)}
.g-4{grid-template-columns:repeat(4,1fr)}
@media(max-width:900px){.g-4{grid-template-columns:repeat(2,1fr)}.g-3{grid-template-columns:repeat(2,1fr)}}
@media(max-width:560px){.g-4,.g-3,.g-2{grid-template-columns:1fr}}
.card{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:18px}
.card h3{font-size:12px;font-weight:600;color:var(--ink-dim);text-transform:uppercase;letter-spacing:.06em;margin-bottom:14px;display:flex;align-items:center;justify-content:space-between}

/* ---------- Stat ---------- */
.stat .label{font-size:11px;color:var(--ink-faint);text-transform:uppercase;letter-spacing:.05em;font-weight:600;margin-bottom:7px}
.stat .val{font-family:var(--mono);font-size:27px;font-weight:700;letter-spacing:-.02em;line-height:1}
.stat .delta{font-size:12px;font-family:var(--mono);margin-top:7px;color:var(--ink-dim)}
.pos{color:var(--green)}.neg{color:var(--red)}.neu{color:var(--ink-dim)}

/* ---------- Discipline gauge (signature) ---------- */
.disc-card{background:linear-gradient(160deg,var(--panel-2),var(--panel));border:1px solid var(--line);position:relative;overflow:hidden}
.disc-wrap{display:flex;align-items:center;gap:26px;flex-wrap:wrap}
.gauge{position:relative;width:150px;height:150px;flex:0 0 auto}
.gauge svg{transform:rotate(-90deg)}
.gauge .center{position:absolute;inset:0;display:grid;place-items:center;text-align:center}
.gauge .center .big{font-family:var(--mono);font-size:30px;font-weight:700;line-height:1}
.gauge .center .cap{font-size:10px;color:var(--ink-faint);text-transform:uppercase;letter-spacing:.06em;margin-top:3px}
.disc-detail{flex:1;min-width:220px}
.disc-detail .row{display:flex;justify-content:space-between;align-items:baseline;padding:8px 0;border-bottom:1px solid var(--line)}
.disc-detail .row:last-child{border-bottom:none}
.disc-detail .row .k{font-size:13px;color:var(--ink-dim)}
.disc-detail .row .v{font-family:var(--mono);font-size:15px;font-weight:600}

/* ---------- Table ---------- */
.table-wrap{overflow-x:auto;border-radius:var(--radius);border:1px solid var(--line)}
table{width:100%;border-collapse:collapse;font-size:13px;min-width:760px}
th{text-align:left;padding:11px 13px;font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:var(--ink-faint);font-weight:600;background:var(--panel-2);position:sticky;top:0;border-bottom:1px solid var(--line)}
td{padding:11px 13px;border-bottom:1px solid var(--line);font-family:var(--mono);font-size:12.5px}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--panel-2)}
.tag{display:inline-block;padding:2px 8px;border-radius:6px;font-size:10.5px;font-weight:600;font-family:var(--sans);letter-spacing:.02em}
.tag.ok{background:rgba(61,220,132,.13);color:var(--green)}
.tag.bad{background:rgba(255,93,93,.13);color:var(--red)}
.tag.warn{background:rgba(255,184,77,.13);color:var(--amber)}
.tag.neutral{background:var(--panel-2);color:var(--ink-dim)}

/* ---------- Forms / Modal ---------- */
.modal-bg{position:fixed;inset:0;background:rgba(4,7,11,.72);backdrop-filter:blur(4px);z-index:100;display:none;align-items:flex-start;justify-content:center;padding:40px 16px;overflow-y:auto}
.modal-bg.show{display:flex}
.modal{background:var(--panel);border:1px solid var(--line);border-radius:18px;width:100%;max-width:560px;padding:22px;margin-bottom:40px}
.modal h2{font-size:17px;margin-bottom:18px;display:flex;justify-content:space-between;align-items:center}
.field{margin-bottom:14px}
.field label{display:block;font-size:12px;color:var(--ink-dim);margin-bottom:6px;font-weight:600}
.field input,.field select,.field textarea{width:100%;background:var(--bg);border:1px solid var(--line);border-radius:9px;padding:10px 12px;color:var(--ink);font-family:var(--mono);font-size:13px}
.field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:var(--green)}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.field-row-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
@media(max-width:480px){.field-row,.field-row-3{grid-template-columns:1fr}}
.chips{display:flex;flex-wrap:wrap;gap:7px}
.chip{padding:7px 12px;border-radius:8px;border:1px solid var(--line);background:var(--bg);color:var(--ink-dim);font-size:12px;font-weight:600;cursor:pointer;transition:.12s}
.chip.on{background:rgba(255,93,93,.12);border-color:var(--red-dim);color:var(--red)}
.chip.on.good{background:rgba(61,220,132,.12);border-color:var(--green-dim);color:var(--green)}
.modal-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:20px}

/* ---------- Misc ---------- */
.empty{text-align:center;padding:50px 20px;color:var(--ink-faint)}
.empty .ico{font-size:34px;margin-bottom:12px;opacity:.5}
.bar-track{height:7px;background:var(--bg);border-radius:5px;overflow:hidden;margin-top:8px}
.bar-fill{height:100%;border-radius:5px;transition:width .4s}
.section-title{font-size:18px;font-weight:700;margin:6px 0 16px;letter-spacing:-.01em}
.hint{font-size:12px;color:var(--ink-faint);line-height:1.5}
.pill-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}
.insight{background:var(--panel-2);border-left:3px solid var(--accent);border-radius:8px;padding:13px 15px;font-size:13px;line-height:1.55;color:var(--ink-dim);margin-bottom:10px}
.insight b{color:var(--ink)}
.insight.warn{border-left-color:var(--amber)}
.insight.bad{border-left-color:var(--red)}
.mini-bars{display:flex;align-items:flex-end;gap:5px;height:90px;margin-top:6px}
.mini-bars .b{flex:1;border-radius:4px 4px 0 0;min-height:3px;position:relative;transition:.3s}
.legend{display:flex;gap:14px;flex-wrap:wrap;font-size:11px;color:var(--ink-dim);margin-top:12px}
.legend span{display:flex;align-items:center;gap:5px}
.dot{width:9px;height:9px;border-radius:3px;display:inline-block}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--panel-2);border:1px solid var(--line);
  color:var(--ink);padding:12px 20px;border-radius:11px;font-size:13px;font-weight:600;opacity:0;transition:.25s;z-index:200;pointer-events:none}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.fab{position:fixed;right:20px;bottom:24px;width:56px;height:56px;border-radius:50%;background:var(--green);color:#04210f;border:none;font-size:26px;
  cursor:pointer;box-shadow:0 6px 24px rgba(61,220,132,.35);z-index:60;display:grid;place-items:center}
.fab:active{transform:scale(.93)}
canvas{max-width:100%}
.acct-row{display:flex;justify-content:space-between;align-items:center;padding:13px 0;border-bottom:1px solid var(--line)}
.acct-row:last-child{border-bottom:none}
.acct-meta{font-size:11px;color:var(--ink-faint);font-family:var(--mono);margin-top:3px}
.dd-warn{color:var(--red)!important}
.calc-out{background:var(--bg);border:1px solid var(--line);border-radius:11px;padding:16px;margin-top:4px}
.calc-out .big{font-family:var(--mono);font-size:24px;font-weight:700}
hr.sep{border:none;border-top:1px solid var(--line);margin:18px 0}

/* ---------- Calendar ---------- */
.cal-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.cal-head .month{font-size:16px;font-weight:700;text-transform:capitalize}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px}
.cal-dow{text-align:center;font-size:10px;color:var(--ink-faint);text-transform:uppercase;letter-spacing:.05em;font-weight:600;padding:4px 0}
.cal-cell{aspect-ratio:1;border:1px solid var(--line);border-radius:10px;padding:7px;display:flex;flex-direction:column;background:var(--panel);min-height:62px;position:relative}
.cal-cell.empty{background:transparent;border:none}
.cal-cell.win{background:rgba(61,220,132,.10);border-color:var(--green-dim)}
.cal-cell.loss{background:rgba(255,93,93,.10);border-color:var(--red-dim)}
.cal-cell.today{box-shadow:0 0 0 2px var(--blue) inset}
.cal-cell .daynum{font-size:11px;color:var(--ink-dim);font-weight:600}
.cal-cell .pnl{font-family:var(--mono);font-size:12px;font-weight:700;margin-top:auto}
.cal-cell .meta{font-size:9px;color:var(--ink-faint);font-family:var(--mono)}
.cal-cell.clickable{cursor:pointer;transition:.12s}
.cal-cell.clickable:hover{border-color:#2c3849}
.cal-cell .flag-dot{position:absolute;top:6px;right:6px;width:7px;height:7px;border-radius:50%;background:var(--red)}
@media(max-width:560px){.cal-cell{min-height:48px;padding:4px}.cal-cell .pnl{font-size:10px}.cal-cell .meta{display:none}}
.cal-month-stats{display:flex;gap:14px;flex-wrap:wrap;margin-top:16px;font-size:12px}
.cal-month-stats .s{display:flex;flex-direction:column}
.cal-month-stats .s .k{color:var(--ink-faint);font-size:10px;text-transform:uppercase;letter-spacing:.04em}
.cal-month-stats .s .v{font-family:var(--mono);font-size:16px;font-weight:700;margin-top:2px}
.thumb-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px}
.thumb{width:64px;height:64px;border-radius:8px;object-fit:cover;border:1px solid var(--line);cursor:pointer}
.lightbox{position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:300;display:none;align-items:center;justify-content:center;padding:20px}
.lightbox.show{display:flex}
.lightbox img{max-width:100%;max-height:100%;border-radius:10px}
.img-drop{border:1px dashed var(--line);border-radius:10px;padding:14px;text-align:center;color:var(--ink-faint);font-size:12px;cursor:pointer;transition:.12s}
.img-drop:hover{border-color:var(--green-dim);color:var(--ink-dim)}

/* ---------- Plan checklist ---------- */
.plan-box{background:var(--bg);border:1px solid var(--line);border-radius:11px;padding:13px 15px;margin-bottom:16px}
.plan-title{font-size:12px;font-weight:700;color:var(--ink);margin-bottom:10px}
.plan-item{display:flex;align-items:flex-start;gap:9px;padding:5px 0;font-size:13px;color:var(--ink-dim);cursor:pointer}
.plan-item input{margin-top:2px;accent-color:var(--green);width:15px;height:15px;flex:0 0 auto}
.plan-item span{line-height:1.4}
.plan-count{font-size:11px;font-family:var(--mono);color:var(--ink-faint);margin-top:9px;padding-top:9px;border-top:1px solid var(--line)}

/* ---------- Phase filter ---------- */
.cal-cell.notrade{background:rgba(138,151,168,.07);border-color:var(--line);border-style:dashed}
.cal-cell .nt-mark{font-size:15px;margin-top:auto;opacity:.55}
.cal-cell .nt-reason{font-size:8px;color:var(--ink-faint);line-height:1.2}
@media(max-width:560px){.cal-cell .nt-reason{display:none}}
.phase-filter{display:inline-flex;gap:3px;background:var(--panel);border:1px solid var(--line);border-radius:11px;padding:4px;margin-bottom:18px}
.phase-btn{background:transparent;border:none;color:var(--ink-dim);font-family:var(--sans);font-size:13px;font-weight:600;padding:7px 15px;border-radius:8px;cursor:pointer;transition:.14s;display:flex;align-items:center;gap:6px}
.phase-btn:hover{color:var(--ink)}
.phase-btn.active{background:var(--panel-2);color:var(--ink);box-shadow:0 1px 3px rgba(0,0,0,.3)}
.phase-btn .pf-count{font-family:var(--mono);font-size:10px;color:var(--ink-faint);background:var(--bg);padding:1px 6px;border-radius:5px}
.phase-btn.active .pf-count{color:var(--green)}
</style>
</head>
<body>
<div class="app">
  <header class="topbar">
    <div class="brand">
      <div class="mark">CR</div>
      <div>
        <h1>CRT Desk</h1>
        <div class="sub">FUTURES · PROP · INTRADAY</div>
      </div>
    </div>
    <div class="topbar-actions">
      <button class="btn ghost sm icon" id="exportBtn" title="Exportar datos">⤓</button>
      <button class="btn ghost sm icon" id="importBtn" title="Importar datos">⤒</button>
      <button class="btn ghost sm" id="noTradeBtn" title="Registrar dia sense trade">🚫 Sense trade</button>
      <button class="btn primary sm" id="addTradeBtn">+ Trade</button>
    </div>
  </header>

  <nav class="tabs" id="tabs">
    <button class="tab active" data-tab="overview">Resumen</button>
    <button class="tab" data-tab="discipline">Disciplina</button>
    <button class="tab" data-tab="performance">Rendimiento</button>
    <button class="tab" data-tab="capital">Capital & Sizing</button>
    <button class="tab" data-tab="accounts">Cuentas & Payouts</button>
    <button class="tab" data-tab="calendar">Calendario</button>
    <button class="tab" data-tab="journal">Journal</button>
  </nav>

  <main id="view"></main>
</div>

<button class="fab" id="fab">+</button>
<div class="toast" id="toast"></div>
<div class="modal-bg" id="modalBg"></div>
<input type="file" id="fileInput" accept="application/json" style="display:none">

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<script src="app.js"></script>
</body>
</html>
